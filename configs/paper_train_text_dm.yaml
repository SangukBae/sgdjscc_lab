# configs/paper_train_text_dm.yaml – PAPER reproduction: Stage 2 (text-guided DM)
#
# Paper-faithful path (paper_mode=true). With the JSCC model frozen, train the
# text-guided latent DM (MDTv2) to predict f0 from f_t (Algorithm 1; masked +
# unmasked branches), continuous timestep + sigmoid schedule, CFG dropout with a
# LEARNED null token.
#
# paper_mode guardrails BLOCK auto-generated captions (scripts/generate_captions.py)
# and the 'filename' source → use DATASET-PROVIDED captions. COCO ships captions:
#   caption_source: coco_json  + caption_path: captions_train2017.json
#
# Usage:
#   python scripts/train.py --config configs/paper_train_text_dm.yaml \
#       --train-list data/coco/train2017 --val-list data/coco/val2017 --device cuda:0

_defaults_:
  - channel/awgn
  - model/sgdjscc
  - infer/awgn
  - eval/default
  - train/default

paper_mode: true

use_semantic:   true
use_text:       true
use_controlnet: false

train:
  stage: text_dm
  batch_size:       64
  max_steps:        250000   # paper DM stage ≈ 250k steps (Table III)
  log_every_steps:  100
  save_every_steps: 5000
  val_every_steps:  5000
  dataset:
    type: text_image
    # Dataset-provided captions only (auto-captions are blocked in paper_mode).
    caption_source:   coco_json
    caption_path:     ../data/coco/annotations/captions_train2017.json
    val_caption_path: ../data/coco/annotations/captions_val2017.json
    caption_select:   random
  transforms:
    resize_to: 128
    crop_mode: center
  dm:
    use_masked_branch: true
    mask_weight: 1.0
    cfg_dropout_prob: 0.1
    cfg_null_mode: learned     # PAPER: trainable null token (not the zero vector)

checkpoint_dir:  "../outputs/checkpoints/paper_text_dm"
train_log_path:  "../outputs/paper_text_dm_train_log.jsonl"
