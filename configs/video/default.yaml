# configs/video/default.yaml – Phase 4-B temporal pipeline settings
#
# Loaded alongside the main config for video / keyframe evaluation
# (scripts/evaluate_video.py).  All fields are optional and default-safe so the
# image evaluation path is unaffected.

# ── Master switch ─────────────────────────────────────────────────────────────
use_temporal: true                     # Enable the keyframe/inter-frame pipeline

# ── Scene-change detection ────────────────────────────────────────────────────
scene_change:
  threshold: 0.35                      # combined-distance threshold for a new scene
  hist_weight: 1.0                     # colour-histogram delta weight (model-free)
  clip_weight: 0.0                     # CLIP image-image distance weight (needs CLIP)
  lpips_weight: 0.0                    # LPIPS distance weight (needs lpips package)
  hist_bins: 16
  use_lpips: false

# ── Keyframe extraction ───────────────────────────────────────────────────────
keyframe:
  max_gop: 12                          # force a refresh keyframe every N frames

# ── Temporal pipeline ─────────────────────────────────────────────────────────
temporal:
  reuse_threshold: 0.2                 # delta magnitude below which a frame reuses
                                       # the keyframe reconstruction (no diffusion)
  # semantic_delta_threshold: 0.2      # optional alias for reuse_threshold
                                       # (ETRI naming; overrides it when set)
  # ── Motion gate (ETRI 1차 step 3 — semantic delta + motion dual gate) ──────
  # Default null = motion gate OFF → decisions identical to the legacy
  # semantic-delta-only pipeline. When set, inter-frames whose motion score vs
  # the keyframe is >= motion_threshold are recomputed even if the semantic
  # delta is small (catches camera pan/zoom with an unchanged object set).
  # score = (1 - motion_weight)*residual_energy + motion_weight*block_max
  motion_threshold: null               # e.g. 0.08 — tune per dataset
  motion_weight: 0.5                   # blend: global residual vs max block motion
  motion_grid: 8                       # block grid for motion_residual estimates
  # Start-only generate branch (ETRI 3차) is configured under video_generator:
  # below (use_video_gen + video_generator.enabled), not here.

# ── Video IO (ETRI 1차 step 1 — mp4 input / reconstructed frames + mp4) ───────
video_io:
  extracted_frames_dir: "../outputs/video_frames"  # mp4 input → frame folder here
  recon_frames_dir: "../outputs/recon_frames"      # reconstructed frame folder
  save_recon_frames: true              # write reconstructed frames as PNGs
  save_recon_video: false              # re-assemble an mp4 (or use --save-video)
  recon_video: "../outputs/recon.mp4"  # output mp4 path
  fps: null                            # output fps; null = source fps (mp4 input)
                                       # or 24 for frame-folder inputs

# ── Outputs ───────────────────────────────────────────────────────────────────
keyframe_json: "../outputs/keyframes.json"        # GOP / keyframe structure
segment_json: "../outputs/segments.json"          # GOP/segment records (step 4)
temporal_csv: "../outputs/temporal_metrics.csv"   # per-sequence temporal metrics
                                                  # incl. provisional PTC/SFR/SDI
frame_log_csv: "../outputs/temporal_frames.csv"   # per-frame log incl. gate
                                                  # decision + motion score

# ── Packet Verifier + regeneration controller (ETRI 2차 step 7) ───────────────
# Rx-legal packet verifier: compares each frame's original/transmitted packet
# against its reconstructed-frame packet (evaluators/packet_verifier.py) and
# derives a rule-based controller decision (controllers/verifier_controller.py).
#
# Default OFF (both use_packet_verifier and verifier.enabled must be true, on
# top of the use_phase4 master switch — see phase_gates.py). Enabling this only
# ADDS report files and two extra frame_log_csv columns / one segments.json key
# ("severity", "controller_decision", "verifier_summary"); it never changes the
# temporal pipeline's reconstruction or any existing metric.
#
# 2차 scope note: the controller only decides and logs. It does not inject
# negative prompts / prompt emphasis into the sampler or trigger an actual
# recompute — see controllers/verifier_controller.py's module docstring.
use_packet_verifier: false             # phase4-gated master flag for this feature
verifier:
  enabled: false                       # second explicit switch (both must be true)
  severity_threshold: 0.6              # severity >= this → fallback_recompute
  keyframe_fallback_severity: 0.85     # severity >= this (inter-frame only) → keyframe_fallback
  accept_severity: 0.15                # severity <= this (or no error mode) → accept
  missing_object_threshold: 1          # >= this many missing objects → missing_object mode
  additional_object_threshold: 1       # >= this many additional objects → additional_object mode
  structural_error_threshold: 1        # >= this many relation+attribute errors → structural mode
  save_reports: true                   # write packet_match_report / controller_decisions
  report_json: "../outputs/packet_match_report.json"
  report_csv: "../outputs/packet_match_report.csv"
  decisions_json: "../outputs/controller_decisions.json"
  decisions_csv: "../outputs/controller_decisions.csv"

  # ── Presence-backend enhancement (ETRI 5차 step 8) ──────────────────────────
  # Lets missing/additional-object judgments be re-checked by a presence
  # backend (evaluators/presence_backends.py) instead of trusting the packet's
  # CLIP/caption-derived object list alone. Default OFF — with
  # use_presence_calibration: false, PacketVerifier.verify() is byte-identical
  # to 2~4차 (calibrated_presence_result stays None, raw_clip_result mirrors
  # the same numbers as the top-level fields). This is calibration
  # *structure*, not a verified accuracy improvement — real OWLv2/VQA weights
  # are optional and never required for tests (see presence_backends.py).
  use_presence_calibration: false
  presence_mode: clip_only             # clip_only | owlv2_only | vqa_only | gt_only |
                                       # ensemble_majority | ensemble_weighted
  presence_backends: ["clip"]          # backend(s) to build; "*_only" modes only need
                                       # their one matching backend, ensemble modes use all
  presence_backend_weights: {}         # optional per-backend weight for ensemble_weighted
                                       # (default 1.0 for any backend not listed)
  # metric_role tags every packet_match_report row so a loop-internal
  # (regeneration-driving) score is never confused with a held-out
  # (final-report) one — see evaluators/packet_verifier.py.
  metric_role: loop_internal           # loop_internal | held_out

# ── Start-only / bidirectional video generation branch (ETRI 3차 step 5 + 4차 step 6) ──
# Adds a third TemporalPipeline inter-frame branch — reuse / recompute / generate
# — alongside the existing reuse/recompute-only pipeline. Scope: prove the
# 3-way branch (and, since 4차, its bidirectional conditioning variant) works
# structurally with cheap mock backends (copy / linear interpolation /
# bidirectional interpolation), NOT deliver production generation quality or
# a verified drift/flicker reduction. Real backends (SVD/Open-Sora) are a
# reserved extension point — see src/sgdjscc_lab/video/video_generator.py.
#
# Default OFF (both use_video_gen and video_generator.enabled must be true, on
# top of the use_phase4 master switch — mirrors the verifier's dual-flag gate
# above). With this off, TemporalPipeline never builds/calls a video_generator
# and every inter-frame decision is exactly the pre-3차 reuse/recompute choice
# — numerically identical to 1~3차 output. conditioning_mode also defaults to
# start_only, so simply turning generate ON (without touching conditioning_mode
# or comparison_enabled) reproduces exact 3차 behaviour.
use_video_gen: false                   # phase4-gated master flag for this feature
video_generator:
  enabled: false                       # second explicit switch (both must be true)
  backend: auto                        # "auto" chooses copy for start_only and
                                       # bidirectional_interpolation for bidirectional.
                                       # Explicit values: "copy" | "interpolation" (start_only),
                                       # "bidirectional_interpolation" (bidirectional).
                                       # Mock backends only — unknown/real-backend names
                                       # raise NotImplementedError.
  conditioning_mode: start_only         # "start_only" (3차, default) | "bidirectional" (4차)
  interpolation_alpha: 0.5              # blend weight when backend: interpolation (start_only only)
  allow_ground_truth_reference: false   # TEST/MOCK ONLY — never enable for real evaluation
                                       # (see video/video_generator.py's Rx-legal boundary note)
  # Generate-candidacy band (only reached once a frame fails the reuse dual
  # gate — see TemporalPipeline._is_generate_candidate). Defaults derive from
  # temporal.reuse_threshold / temporal.motion_threshold when left null.
  generate_delta_min: null              # default: temporal.reuse_threshold
  generate_delta_max: null              # default: min(1.0, 3 * temporal.reuse_threshold)
  generate_motion_max: null             # default: temporal.motion_threshold (or unconstrained if
                                       # motion gating itself is off)
  save_generated_frames: true           # write generate-decision frames to generated_frames_dir
  generated_frames_dir: "../outputs/generated_frames"

  # ── Bidirectional conditioning (ETRI 4차) ────────────────────────────────────
  # Applies only when conditioning_mode: bidirectional. A GOP's "end" keyframe
  # is the NEXT GOP's keyframe; the last GOP in a sequence has none.
  bidirectional_missing_end_policy: error   # "error" (raise, default) | "fallback_start_only"
                                            # (degrade that frame to a start-keyframe copy instead)

  # ── start_only vs bidirectional comparison pipeline (ETRI 4차 step 6) ────────
  # Runs the SAME input through both conditioning modes (2x compute) and diffs
  # PTC/SFR/SDI/n_generate/n_reused/n_recompute_*. Requires use_video_gen +
  # video_generator.enabled to also be true; otherwise ignored. Mock backends
  # only — see the module-level scope note in
  # pipelines/generation_mode_comparison.py before citing any diff as a
  # quality/drift-reduction result.
  comparison_enabled: false
  comparison_output: "../outputs/generation_mode_comparison.json"
  comparison_start_only_csv: "../outputs/temporal_metrics_start_only.csv"
  comparison_bidirectional_csv: "../outputs/temporal_metrics_bidirectional.csv"

# ── Held-out re-measurement pipeline (ETRI 5차 step 9) ────────────────────────
# Re-reads TemporalPipeline records (or saved packets) and recomputes
# clip-only vs presence-calibrated packet-verifier reports + PTC/SFR/SDI —
# see pipelines/heldout_remeasurement.py and scripts/remeasure_video_metrics.py.
# Default OFF. With no presence_calibrator (verifier.use_presence_calibration:
# false), "calibrated" == "clip_only" exactly (a built-in sanity check), so
# turning this on alone changes nothing about 1~4차 numbers — it only adds new
# output files.
heldout:
  enabled: false
  clip_only_json: "../outputs/heldout/clip_only_metrics.json"
  clip_only_csv: "../outputs/heldout/clip_only_metrics.csv"
  calibrated_json: "../outputs/heldout/calibrated_metrics.json"
  calibrated_csv: "../outputs/heldout/calibrated_metrics.csv"
  output_json: "../outputs/heldout/metric_delta.json"     # metric_delta.json
  output_csv: "../outputs/heldout/metric_delta.csv"       # metric_delta.csv

# ── Temporal SRS Calibration scaffold (ETRI 5차 step 10) ──────────────────────
# Weight-config load/save + a least-squares weight-FITTING STUB
# (evaluators/temporal_srs_calibration.py). No real VLM judge or human-label
# collection happens from this config — target scores must be supplied by the
# caller (mock/synthetic in tests). Default OFF; enabling only saves a weights
# JSON when a caller explicitly invokes the fitting entry point.
temporal_srs_calibration:
  enabled: false
  weights_output: "../outputs/temporal_srs_calibration_weights.json"
  # srs_weights: {}       # optional override of the initial w_img/w_txt/... guess
  # temporal_weights: {}  # optional override of the initial w_ptc/w_sfr/w_sdi guess
