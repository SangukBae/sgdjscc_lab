# configs/paper_train_controlnet.yaml – PAPER reproduction: Stage 3 (edge ControlNet)
#
# Paper-faithful path (paper_mode=true). From the frozen Stage-2 DM, add edge
# structural guidance via a ControlNet branch (only the structural DiT blocks
# train). paper_mode enforces:
#   • MuGE soft edges        (edge_source=muge_sidecar — precompute first)
#   • trained dedicated edge link
#     (edge_transport=edge_jscc + existing edge_codec checkpoint; no shared_vae/random)
#   • learned CFG null token  (cfg_null_mode=learned)
#   • dataset-provided captions (no auto-captions)
#
# Prereqs: trained Stage-2 DM (paper_train_text_dm) + trained edge codec
# (paper_train_edge_codec → set edge_jscc.checkpoint below) + precomputed MuGE
# edges (scripts/prepare_muge_edges.py, preferably ``--repr edge_uncertainty``).
#
# SCOPE (honest): STRUCTURALLY paper-oriented but COCO-only, whereas the paper
# trains on a much larger (~14M-image) multi-dataset corpus — a smaller practical
# reproduction, not the paper's exact setup. The MuGE soft edge + edge_jscc link
# is the CLOSEST REPRODUCIBLE structure (exact original WITT edge-codec reuse is
# unsupported). batch_size:64 / step counts are paper-table-SCALE targets, not
# public-code-confirmed. See docs/paper_training_alignment.md.
#
# Usage:
#   python scripts/train.py --config configs/paper_train_controlnet.yaml \
#       --train-list data/coco/train2017 --val-list data/coco/val2017 --device cuda:0

_defaults_:
  - channel/awgn
  - model/sgdjscc
  - infer/awgn
  - eval/default
  - train/default

paper_mode: true

use_semantic:   true
use_text:       true
use_controlnet: true

train:
  stage: controlnet
  batch_size:       64
  max_steps:        250000
  log_every_steps:  100
  save_every_steps: 5000
  val_every_steps:  5000
  dataset:
    type: text_image_edge
    caption_source:   coco_json
    caption_path:     ../data/coco/annotations/captions_train2017.json
    val_caption_path: ../data/coco/annotations/captions_val2017.json
    caption_select:   random
    edge_source:      muge_sidecar      # PAPER: MuGE soft edges (precomputed)
    edge_dir:         null
    muge_repr:        edge_uncertainty  # CLOSEST to inference: mean-edge + uncertainty
  transforms:
    resize_to: 128
    crop_mode: center
  dm:
    use_masked_branch: true
    mask_weight: 1.0
    cfg_dropout_prob: 0.1               # assumed default (unpublished in the paper)
    cfg_null_mode: learned              # paper-LIKE: trainable null token
                                        # (the paper does not publish its null token)
  controlnet:
    allow_unfrozen_base_dm: false
    edge_transport: edge_jscc           # PAPER: dedicated edge DeepJSCC link
    edge_jscc:
      checkpoint: ../outputs/checkpoints/paper_edge_codec/best.pth
      arch: vit                         # MUST match paper_train_edge_codec
      snr_db: 10.0
      use_channel: true
      vit:
        embed_dim: 128
        depth: 4
        num_heads: 4
        mlp_ratio: 2.0
        snr_cond: true                  # MUST match the edge_codec checkpoint

checkpoint_dir:  "../outputs/checkpoints/paper_controlnet"
train_log_path:  "../outputs/paper_controlnet_train_log.jsonl"
