_defaults_:
  - ../channel/awgn
  - ../model/sgdjscc
  - ../infer/awgn
  - ../eval/default
  - ../train/default

# Uses BLIP-2-generated SA-1B captions plus sidecar-caption datasets, so this is
# the closest paper-like path with the currently available remote datasets, not a
# paper_mode-faithful reproduction.
paper_mode: false

model_root: ../../checkpoints/

use_semantic: true
use_text: true
use_controlnet: false

train:
  stage: text_dm
  batch_size: 64
  max_steps: 250000
  log_every_steps: 100
  save_every_steps: 5000
  val_every_steps: 5000
  dataset:
    type: text_image
    input_mode: file_list
    file_list_path: ../../data/_lists/paper_like_multi/stage23_train.list
    val_file_list_path: ../../data/_lists/paper_like_multi/stage23_val.list
    caption_source: sidecar
    fallback_caption: "a photo"
  transforms:
    resize_to: 128
    crop_mode: center
  dm:
    use_masked_branch: true
    mask_weight: 1.0
    cfg_dropout_prob: 0.1
    cfg_null_mode: learned

checkpoint_dir: ../../outputs/checkpoints/paper_text_dm_multi
train_log_path: ../../outputs/paper_text_dm_multi_train_log.jsonl
