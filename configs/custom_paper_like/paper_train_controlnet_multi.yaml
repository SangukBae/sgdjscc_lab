_defaults_:
  - ../channel/awgn
  - ../model/sgdjscc
  - ../infer/awgn
  - ../eval/default
  - ../train/default

# This extends the paper-like path to the currently available remote datasets,
# including BLIP-2-captioned SA-1B images and MuGE sidecars.
paper_mode: false

use_semantic: true
use_text: true
use_controlnet: true

train:
  stage: controlnet
  batch_size: 64
  max_steps: 250000
  log_every_steps: 100
  save_every_steps: 5000
  val_every_steps: 5000
  dataset:
    type: text_image_edge
    input_mode: file_list
    file_list_path: ../../data/_lists/paper_like_multi/stage23_train.list
    val_file_list_path: ../../data/_lists/paper_like_multi/stage23_val.list
    caption_source: sidecar
    fallback_caption: "a photo"
    edge_source: muge_sidecar
    muge_repr: edge_uncertainty
  transforms:
    resize_to: 128
    crop_mode: center
  dm:
    use_masked_branch: true
    mask_weight: 1.0
    cfg_dropout_prob: 0.1
    cfg_null_mode: learned
  controlnet:
    allow_unfrozen_base_dm: false
    edge_transport: edge_jscc
    edge_jscc:
      checkpoint: ../../outputs/checkpoints/paper_edge_codec_multi/best.pth
      arch: vit
      snr_db: 10.0
      use_channel: true
      vit:
        embed_dim: 128
        depth: 4
        num_heads: 4
        mlp_ratio: 2.0
        snr_cond: true

checkpoint_dir: ../../outputs/checkpoints/paper_controlnet_multi
train_log_path: ../../outputs/paper_controlnet_multi_train_log.jsonl
